name: Daily Patriots Digest

on:
  schedule:
    # 12:00 UTC = 8:00 AM Eastern (adjust as you like)
    - cron: "0 12 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python generate_digest.py

      - name: Commit and push updated digest
        run: |
          git config user.name "digest-bot"
          git config user.email "actions@github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "Update daily digest"
          git push
